<!DOCTYPE html>
<html>

<head>

    <title>AI Graphics Calculator</title>


    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }



        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            background:
            linear-gradient(
                45deg,
                #020024,
                #090979,
                #00d4ff,
                #8e2de2
            );

            background-size:400% 400%;

            animation:backgroundMove 12s infinite;

        }

        /* Animated Background */

        @keyframes backgroundMove{


            0%{

                background-position:0% 50%;

            }


            50%{

                background-position:100% 50%;

            }


            100%{

                background-position:0% 50%;

            }


        }




        /* Floating AI circles */


        .circle{


            position:absolute;


            border-radius:50%;


            background:

            rgba(255,255,255,0.2);



            animation:move 10s infinite;


        }



        .circle:nth-child(1){


            width:120px;

            height:120px;

            top:10%;

            left:15%;


        }



        .circle:nth-child(2){


            width:80px;

            height:80px;

            top:70%;

            left:75%;


        }




        .circle:nth-child(3){


            width:60px;

            height:60px;


            top:50%;

            left:40%;


        }





        @keyframes move{


            0%{

                transform:translateY(0);

            }


            50%{

                transform:translateY(-120px);

            }


            100%{

                transform:translateY(0);

            }


        }







        /* Main Card */


        .card{


            width:450px;


            padding:40px;


            border-radius:25px;



            background:

            rgba(255,255,255,0.15);



            backdrop-filter:blur(15px);



            box-shadow:


            0px 0px 40px rgba(0,0,0,0.5);



            color:white;



            text-align:center;



            position:relative;



        }




        h1{


            font-size:38px;

            margin-bottom:10px;


        }




        h3{


            margin-bottom:30px;

            color:#00ffcc;


        }





        input{


            width:90%;


            padding:15px;


            margin:12px;



            border:none;



            border-radius:15px;



            outline:none;



            font-size:18px;


        }






        button{


            margin-top:15px;


            padding:15px 45px;



            border:none;



            border-radius:30px;



            background:#00ffcc;



            color:black;



            font-size:18px;



            cursor:pointer;



            transition:0.4s;



        }





        button:hover{


            transform:scale(1.1);



            background:white;


        }







        .result{


            margin-top:30px;



            font-size:30px;



            color:#00ff99;



            animation:show 1s;


        }





        @keyframes show{


            from{

                opacity:0;

                transform:scale(0.5);

            }


            to{

                opacity:1;

                transform:scale(1);

            }


        }



    </style>


</head>


<body>

    <div class="circle"></div>

    <div class="circle"></div>

    <div class="circle"></div>

    <div class="card">
        <h1>
            Docker Application V 0.01
        </h1>

        <h3>
            Created By: Krishan Sharma
        </h3>


        <form method="POST">
            {% csrf_token %}
            <input
            type="number"
            name="a"
            placeholder="Enter First Number"
            required>
            <br>
            <input

            type="number"

            name="b"

            placeholder="Enter Second Number"

            required>
            <br>
            <button type="submit">

                submit

            </button>
        </form>

        {% if result %}

        <div class="result">
            Result = {{ result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
